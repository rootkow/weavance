services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: weavance
      POSTGRES_PASSWORD: weavance
      POSTGRES_USER: weavance
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weavance -d weavance"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: ./apps/api
    command: ["sh", "-c", "alembic upgrade head && uvicorn weavance_api.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      WEAVANCE_DATABASE_URL: postgresql+asyncpg://weavance:weavance@db:5432/weavance
      WEAVANCE_ENVIRONMENT: local
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres-data:
