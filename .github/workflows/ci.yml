name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: weavance_test
          POSTGRES_PASSWORD: weavance
          POSTGRES_USER: weavance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U weavance -d weavance_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      WEAVANCE_TEST_DATABASE_URL: postgresql+asyncpg://weavance:weavance@localhost:5432/weavance_test
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked --dev
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build
